name: CD - Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://bussola-financeira-fe-git-main-danilomelos-projects.vercel.app

    steps:
      - name: Deploy iniciado
        run: |
          echo "Fazendo deploy em produção..."

      - name: Aguardando deploy...
        run: sleep 90

      - name: Health check
        run: |
          curl -f https://bussola-financeira-fe-git-main-danilomelos-projects.vercel.app || exit 1

      - name: Notificar sucesso
        if: success()
        run: echo "Deploy em produção concluído!"

      - name: Notificar falha
        if: failure()
        run: echo "Deploy em produção falhou!"
