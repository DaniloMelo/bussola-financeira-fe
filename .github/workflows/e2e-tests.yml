name: Testes E2E

on:
  workflow_run:
    workflows: ["Testes"]
    types:
      - completed

jobs:
  e2e:
    name: Rodar testes E2E
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Aguardar o Deploy da Vercel e Obert a URL
        id: vercel_preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Instalar Dependencias
        run: npm ci

      - name: Instalar Navegador do Playwright
        run: npx playwright install --with-deps

      - name: Executar Testes E2E
        env:
          BASE_URL: ${{ steps.vercel_preview.outputs.url }}
        run: npx playwright test

      - name: Salvar relatórios e vídeos (Em caso de falha)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-playwright
          path: playwright-report/
          retention-days: 7
